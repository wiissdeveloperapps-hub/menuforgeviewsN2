<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        /* General Body & Theme */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            color: #212529;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #dee2e6;
        }
        #restaurant-logo {
            max-height: 80px;
            max-width: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #restaurant-name {
            font-size: 2.2em;
            margin: 10px 0;
            font-weight: 700;
        }
        #language-selector {
            padding: 10px 15px;
            font-size: 1em;
            border-radius: 8px;
            border: 1px solid #ced4da;
            background-color: #fff;
            margin-bottom: 10px;
        }

        /* Main Container */
        #menu-container {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
        }
        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #6c757d;
        }

        /* Category Styling */
        .category {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #343a40;
            border-bottom: 3px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        /* Dish Styling */
        .dish {
            display: flex;
            gap: 15px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .dish:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .dish-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .dish-details {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .dish-name {
            font-size: 1.25em;
            font-weight: bold;
            margin: 0 0 5px;
        }
        .dish-desc {
            color: #6c757d;
            margin: 0 0 10px;
            flex-grow: 1;
        }
        .dish-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #000;
            align-self: flex-end;
        }

        /* Template: clasica */
        body.template-clasica .category-title {
            font-family: "Times New Roman", serif;
            border-bottom-color: #8B4513; /* SaddleBrown */
        }
        body.template-clasica .dish { border: 1px solid #ddd; }

        /* Template: rustica */
        body.template-rustica { background-color: #f5f5dc; /* Beige */ }
        body.template-rustica header { background-color: #D2B48C; border-bottom-color: #8B4513; }
        body.template-rustica .category-title { color: #556B2F; border-bottom-color: #556B2F; }
        body.template-rustica .dish { background-color: #fffef0; border: 1px solid #D2B48C; }

    </style>
</head>
<body>

    <header id="header-container" style="display: none;">
        <img id="restaurant-logo" src="" alt="Logo del restaurante">
        <h1 id="restaurant-name"></h1>
        <select id="language-selector"></select>
    </header>

    <div id="menu-container">
        <div id="loader">Cargando menú...</div>
    </div>

    <script>
        const REPO_OWNER = 'wiissdeveloperapps-hub';
        const REPO_NAME = 'menuforgeviews';
        let fullMenuData = null;

        const dom = {
            loader: document.getElementById('loader'),
            header: document.getElementById('header-container'),
            restaurantLogo: document.getElementById('restaurant-logo'),
            restaurantName: document.getElementById('restaurant-name'),
            langSelector: document.getElementById('language-selector'),
            menuContainer: document.getElementById('menu-container')
        };

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const hash = window.location.hash.substring(1);
                let menuData;

                if (hash.startsWith('pako:')) {
                    menuData = decompressPako(hash.substring(5));
                } else if (hash.startsWith('remote:')) {
                    menuData = await fetchRemote(hash.substring(7));
                } else {
                    showError('Formato de URL no válido o menú no encontrado.');
                    return;
                }

                if (!menuData || !menuData.traducciones) {
                    showError('No se pudieron cargar los datos del menú o el formato es incorrecto.');
                    return;
                }
                setupUI(menuData);
            } catch (error) {
                console.error('Error al inicializar:', error);
                showError('Ha ocurrido un error al cargar el menú.');
            }
        }

        function decompressPako(base64String) {
            try {
                const compressed = atob(base64String).split('').map(c => c.charCodeAt(0));
                const decompressed = pako.inflate(new Uint8Array(compressed), { to: 'string' });
                return JSON.parse(decompressed);
            } catch (error) {
                console.error('Error al descomprimir:', error);
                throw new Error('Los datos del menú están corruptos.');
            }
        }

        async function fetchRemote(id) {
            const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/contents/menus/${id}.json`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`No se pudo encontrar el menú remoto (ID: ${id})`);
            return await response.json();
        }

        function setupUI(data) {
            fullMenuData = data;
            dom.loader.style.display = 'none';
            dom.header.style.display = 'block';

            dom.langSelector.innerHTML = '';
            Object.keys(fullMenuData.traducciones).forEach(langCode => {
                const option = document.createElement('option');
                option.value = langCode;
                option.textContent = fullMenuData.traducciones[langCode].meta.languageName;
                dom.langSelector.appendChild(option);
            });

            const browserLang = navigator.language.split('-')[0];
            const initialLang = fullMenuData.traducciones[browserLang] ? browserLang : Object.keys(fullMenuData.traducciones)[0];
            dom.langSelector.value = initialLang;

            renderMenu(initialLang);
            dom.langSelector.addEventListener('change', (e) => renderMenu(e.target.value));
        }

        function renderMenu(langCode) {
            if (!fullMenuData) return;
            const langData = fullMenuData.traducciones[langCode];
            if (!langData) {
                showError(`Traducción no disponible para: ${langCode}`);
                return;
            }

            dom.restaurantLogo.src = fullMenuData.logoRestaurante || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            dom.restaurantName.textContent = langData.nombreRestaurante || fullMenuData.nombreRestaurante || 'Restaurante';
            document.body.className = `template-${fullMenuData.plantilla || 'moderna'}`;

            let menuHtml = langData.categorias?.map(category => `
                <div class="category">
                    <h2 class="category-title">${category.nombre}</h2>
                    ${category.platos?.map(dish => `
                        <div class="dish">
                            ${dish.imagen ? `<img class="dish-img" src="${dish.imagen}" alt="${dish.nombre}">` : ''}
                            <div class="dish-details">
                                <div class="dish-name">${dish.nombre}</div>
                                <p class="dish-desc">${dish.descripcion || ''}</p>
                                <div class="dish-price">${formatPrice(dish.precio)}</div>
                            </div>
                        </div>
                    `).join('') || ''}
                </div>
            `).join('') || '<p>Este menú está vacío.</p>';

            dom.menuContainer.innerHTML = menuHtml;
        }

        function formatPrice(price) {
            if (typeof price !== 'number') return '';
            return price.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        function showError(message) {
            dom.loader.style.display = 'none';
            dom.menuContainer.innerHTML = `<p style="color: red; text-align: center; font-size: 1.2em;">${message}</p>`;
        }
    </script>

</body>
</html>
