<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Menú Gourmet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --card: #151515; --text: #ffffff; --accent: #c5a059; --muted: #9aa0a6; }
    body { margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
    
    /* Header Premium */
    .header-container { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
    #logo-display { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); margin: 0; }
    
    /* Selector de Banderas */
    .lang-wrapper { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .lang-btn { background: #222; border: 1px solid #444; cursor: pointer; padding: 5px; border-radius: 6px; }
    .lang-btn img { width: 30px; height: 20px; border-radius: 3px; display: block; }

    /* Menú */
    #menu-container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
    .cat-title { font-family: 'Playfair Display', serif; color: var(--accent); margin: 30px 0 15px; font-size: 1.4rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .plato-card { display: flex; align-items: center; gap: 15px; background: var(--card); border-radius: 12px; margin-bottom: 15px; padding: 10px; border: 1px solid #222; }
    .plato-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #222; }
    .plato-info { flex: 1; }
    .plato-info h3 { margin: 0; font-size: 1rem; }
    .plato-info p { margin: 4px 0 0; font-size: 0.85rem; color: var(--muted); }
    .plato-price { color: var(--accent); font-weight: 700; margin-top: 5px; display: block; }

    /* Botón Flotante PDF */
    .fab-pdf { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; padding: 12px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
  </style>
</head>
<body>

  <div class="header-container" id="pdf-header">
    <img id="logo-display" style="display:none;">
    <h1 id="restaurant-title">Cargando...</h1>
    <div class="lang-wrapper" id="lang-panel"></div>
  </div>

  <main id="menu-container"></main>

  <button class="fab-pdf" id="btn-pdf">Descargar PDF</button>

  <script>
    const FLAG_DIR = 'assets/flags/';
    const FLAG_MAP = { es:'es.png', en:'en.png', fr:'fr.png', it:'it.png', de:'de.png', pt:'pt.png', cn:'cn.png', sa:'sa.png' };
    const REPO_OWNER = 'wiissdeveloperapps-hub';
    const REPO_NAME = 'menuforgeviews';
    
    let menuData = null;
    let imageMap = {}; // Mapa para buscar imágenes por ID

    window.addEventListener('load', async () => {
      const hash = window.location.hash.substring(1);
      if (hash.startsWith('remote:')) {
        const id = hash.replace('remote:', '');
        try {
          const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/contents/menus/${id}.json`);
          menuData = await res.json();
          
          // Mapear imágenes del JSON raíz por ID
          menuData.categorias.forEach(cat => {
            cat.platos.forEach(p => imageMap[p.id] = p.imagen);
          });
          
          if(menuData.logoBase64) {
             const img = document.getElementById('logo-display');
             img.src = menuData.logoBase64;
             img.style.display = 'block';
          }

          buildLangPanel();
          render('es');
        } catch(e) { document.getElementById('restaurant-title').textContent = 'Error al cargar'; }
      }
    });

    function buildLangPanel() {
      const panel = document.getElementById('lang-panel');
      Object.keys(menuData.traducciones || {}).forEach(code => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn';
        btn.innerHTML = `<img src="${FLAG_DIR}${FLAG_MAP[code] || code+'.png'}">`;
        btn.onclick = () => render(code);
        panel.appendChild(btn);
      });
    }

    function render(lang) {
      const trad = menuData.traducciones[lang];
      document.getElementById('restaurant-title').textContent = trad.nombre;
      const container = document.getElementById('menu-container');
      container.innerHTML = '';
      
      trad.categorias.forEach((cat, catIndex) => {
        container.innerHTML += `<h2 class="cat-title">${cat.nombre}</h2>`;
        cat.platos.forEach((p, pIndex) => {
          // Buscamos la imagen original en el JSON raíz usando el ID del plato
          const imgBase64 = imageMap[p.id] || '';
          container.innerHTML += `
            <div class="plato-card">
              <img src="${imgBase64}" class="plato-img" onerror="this.style.display='none'">
              <div class="plato-info">
                <h3>${p.nombre}</h3>
                <p>${p.descripcion || ''}</p>
                <span class="plato-price">${p.precio || 0}€</span>
              </div>
            </div>`;
        });
      });
    }

    document.getElementById('btn-pdf').onclick = () => {
      const btn = document.getElementById('btn-pdf');
      btn.style.display = 'none';
      html2pdf().from(document.body).save('menu.pdf').then(() => btn.style.display = 'block');
    };
  </script>
</body>
</html>
