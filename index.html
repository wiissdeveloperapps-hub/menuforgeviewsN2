<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menú Digital - Viewer</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

  <style>
    :root { --theme: dark; }
    :root[data-theme="dark"] { --bg: #0f0f0f; --card-bg: #121212; --muted: #9aa0a6; --text: #ffffff; --accent: #c5a059; --accent-2: #7bd389; }
    :root[data-theme="light"] { --bg: #f7f7f8; --card-bg: #ffffff; --muted: #6b7280; --text: #0b1220; --accent: #1f6feb; --accent-2: #ff7a59; }
    :root[data-theme="gold"] { --bg: #0b0b0b; --card-bg: linear-gradient(135deg,#1a1a1a 0%, #0f0f0f 100%); --muted: #bfb1a0; --text: #fffaf0; --accent: #e0b24a; --accent-2: #d46a6a; }
    html { height:100%; }
    body { margin:0; min-height:100%; font-family:Inter, sans-serif; background:var(--bg); color:var(--text); transition:background .25s ease; }
    #pdf-content { max-width:900px; margin: 30px auto 120px; padding: 24px; }
    .header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding: 28px; border-radius: 12px; margin-bottom: 18px; background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); box-shadow: 0 6px 18px rgba(0,0,0,0.35); }
    .brand { display:flex; align-items:center; gap:14px; }
    .brand .logo { width:72px; height:72px; border-radius:12px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:var(--accent); color:#111; font-weight:700; font-family:Playfair Display, serif; font-size:1.4rem; box-shadow: 0 6px 18px rgba(0,0,0,0.35); }
    .brand h1 { margin:0; font-family:Playfair Display, serif; font-size:1.6rem; color:var(--accent); }
    .brand p { margin:0; color:var(--muted); font-size:0.85rem; }
    .controls-container { position: fixed; right: 28px; bottom: 28px; display:flex; flex-direction:column; gap:12px; z-index:1200; align-items:flex-end; }
    .fab { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border-radius:999px; cursor:pointer; border:none; outline:none; background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)); color:var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.45); backdrop-filter: blur(6px); }
    .fab.pdf { background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)); color:#fff; }
    .fab.lang { background: var(--accent); color:#111; font-weight:700; }
    .lang-panel { position: fixed; right: 28px; bottom: 92px; display:flex; flex-direction:column; gap:8px; z-index:1199; background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25)); padding:8px; border-radius:10px; box-shadow: 0 10px 30px rgba(0,0,0,0.45); display:none; }
    .lang-panel.active { display:flex; }
    .lang-item { display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:8px; cursor:pointer; min-width:140px; }
    .lang-item:hover { background: rgba(255,255,255,0.02); }
    .lang-flag { width:36px; height:24px; border-radius:4px; overflow:hidden; flex:0 0 36px; }
    .lang-flag img { width:100%; height:100%; object-fit:cover; display:block; }
    .lang-label { color:var(--text); font-weight:600; font-size:0.95rem; }
    #menu-container { display:flex; flex-direction:column; gap:22px; }
    .categoria-titulo { text-align:center; font-family:Playfair Display, serif; font-size:1.8rem; color:var(--accent); margin: 18px 0 6px; }
    .platos-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:18px; }
    .plato-card { display:flex; gap:12px; align-items:stretch; padding:12px; border-radius:14px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); overflow:hidden; transition: transform .18s ease, box-shadow .18s ease; }
    .plato-card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,0.5); }
    .plato-media { width:140px; height:120px; flex:0 0 140px; border-radius:10px; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center; }
    .plato-media img { width:100%; height:100%; object-fit:cover; display:block; }
    .plato-body { flex:1; display:flex; flex-direction:column; justify-content:space-between; padding:6px 0; }
    .plato-nombre { font-weight:700; font-size:1.05rem; margin:0; color:var(--text); }
    .plato-desc { margin:6px 0 0; color:var(--muted); font-size:0.92rem; line-height:1.3; }
    .plato-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .plato-precio { color:var(--accent); font-weight:800; font-size:1.05rem; }
  </style>
</head>
<body>
  <div id="pdf-content" role="main" aria-live="polite">
    <header class="header">
      <div class="brand">
        <div class="logo" id="logo-letter">M</div>
        <div>
          <h1 id="restaurant-title">Cargando...</h1>
          <p id="subtitle">Nuestro Menú</p>
        </div>
      </div>
      <div id="meta-info" style="text-align:right; color:var(--muted); font-size:0.9rem;"></div>
    </header>
    <main id="menu-container"></main>
  </div>

  <div class="controls-container">
    <button class="fab pdf" id="btn-pdf">PDF</button>
    <button class="fab lang" id="btn-lang">Idioma</button>
  </div>
  <div id="lang-panel" class="lang-panel"></div>

  <script>
    const FLAG_DIR = 'assets/flags/';
    const FLAG_MAP = { es:'es.png', en:'en.png', fr:'fr.png', it:'it.png', de:'de.png', pt:'pt.png', cn:'cn.png', sa:'sa.png' };
    const REPO_OWNER = 'wiissdeveloperapps-hub';
    const REPO_NAME = 'menuforgeviews';

    let menuData = null;

    function initMenuApp(data) {
      menuData = data;
      sessionStorage.setItem('cachedMenu', JSON.stringify(menuData));
      renderMenu();
    }

    function renderMenu(lang = 'es') {
      if (!menuData) return;
      const content = menuData.traducciones ? (menuData.traducciones[lang] || menuData.traducciones['es'] || menuData) : menuData;
      document.getElementById('restaurant-title').textContent = content.nombre || 'Restaurante';
      document.getElementById('menu-container').innerHTML = '';
      // (Aquí va el resto de tu lógica de renderizado que ya tenías)
      // ... resto del render ...
    }

    window.addEventListener('load', () => {
      const hash = window.location.hash.substring(1);
      if (hash.startsWith('remote:')) {
        const id = hash.replace('remote:', '');
        const rawJsonUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/contents/menus/${id}.json`;
        
        fetch(rawJsonUrl)
          .then(res => res.json())
          .then(data => initMenuApp(data))
          .catch(() => {
            const cached = sessionStorage.getItem('cachedMenu');
            if (cached) initMenuApp(JSON.parse(cached));
            else document.getElementById('restaurant-title').textContent = 'Menú no encontrado';
          });
      }
    });
  </script>
</body>
</html>
