<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #0f0f0f; 
            --card-bg: #1a1a1a; 
            --text-main: #ffffff; 
            --text-muted: #a0a0a0; 
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; }
        
        .header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin: 0; }
        .header p { color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; margin-top: 10px; }

        #menu-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .categoria-titulo { 
            font-family: 'Playfair Display', serif; color: var(--gold); 
            text-align: center; font-size: 1.8rem; margin: 50px 0 30px; 
            position: relative;
        }
        .categoria-titulo::after { content: ""; display: block; width: 50px; height: 1px; background: var(--gold); margin: 10px auto; }

        .plato-card { 
            background: var(--card-bg); border-radius: 16px; margin-bottom: 20px; 
            display: flex; align-items: center; border: 1px solid #333; 
            overflow: hidden; transition: 0.3s;
        }
       .plato-img { 
    width: 110px; 
    height: 110px; 
    object-fit: cover; 
    /* ESTA ES LA LÍNEA MÁGICA PARA LA ROTACIÓN */
    image-orientation: from-image; 
    /* Fallback por si acaso */
    transform: rotate(0deg); 
}
        .plato-info { padding: 20px; flex: 1; }
        .plato-nombre { font-size: 1.2rem; font-weight: 600; margin: 0 0 5px; color: #fff; }
        .plato-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin: 0; }
        .plato-precio { color: var(--gold); font-weight: 700; margin-top: 10px; font-size: 1.1rem; }

        /* Controles flotantes unificados */
        .controls-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .fab-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; outline: none; }
        .fab-pdf { background: #333; color: white; box-shadow: 0 0 15px rgba(0,0,0,0.5); font-weight: bold;}
        .fab-lang { background: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); border: 2px solid var(--gold);}
        
        .lang-options { position: fixed; bottom: 105px; right: 35px; display: none; flex-direction: column; gap: 10px; z-index: 99;}
        .lang-options.active { display: flex; }
        .lang-btn { cursor: pointer; border-radius: 50%; overflow: hidden; border: 2px solid var(--gold); width: 45px; height: 45px; }
        .lang-btn img, .fab-lang img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%;}
    </style>
</head>
<body>
    <div id="pdf-content">
        <header class="header">
            <h1 id="restaurant-title">Cargando...</h1>
            <p>Nuestro Menú</p>
        </header>
        <main id="menu-container"></main>
    </div>

    <div id="lang-menu" class="lang-options">
        <div class="lang-btn" onclick="changeLanguage('es', 'assets/flags/es.png')"><img src="assets/flags/es.png" alt="ES"></div>
        <div class="lang-btn" onclick="changeLanguage('en', 'assets/flags/en.png')"><img src="assets/flags/en.png" alt="EN"></div>
    </div>

    <div class="controls-container">
        <button class="fab-btn fab-pdf" onclick="descargarPDF()">PDF</button>
        <div class="fab-btn fab-lang" onclick="document.getElementById('lang-menu').classList.toggle('active')">
            <img id="current-flag" src="assets/flags/es.png" width="35">
        </div>
    </div>

    <script>
        let menuData = null;

        window.onload = () => {
            // Leer desde el Hash (#)
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    menuData = JSON.parse(decodeURIComponent(escape(atob(hash))));
                    renderMenu('es'); // Idioma por defecto
                } catch (e) {
                    document.getElementById('restaurant-title').innerText = "Error leyendo menú";
                }
            } else {
                document.getElementById('restaurant-title').innerText = "Escanea un QR válido";
            }
        };

        function changeLanguage(langCode, flagSrc) {
            document.getElementById('current-flag').src = flagSrc;
            document.getElementById('lang-menu').classList.remove('active');
            renderMenu(langCode);
        }

        function renderMenu(lang) {
            if (!menuData) return;
            
            // Lógica para detectar si tienes traducciones, si no, pinta la raíz
            const content = menuData.traducciones ? (menuData.traducciones[lang] || menuData.traducciones['es']) : menuData;
            
            document.getElementById('restaurant-title').innerText = menuData.nombre || "Restaurante";
            const container = document.getElementById('menu-container');
            
            container.innerHTML = content.categorias.map(cat => `
                <h2 class="categoria-titulo">${cat.nombre}</h2>
                ${cat.platos.map(p => `
                    <div class="plato-card">
                        ${p.imagen ? `<img src="${p.imagen}" class="plato-img">` : ''}
                        <div class="plato-info">
                            <h3 class="plato-nombre">${p.nombre}</h3>
                            <p class="plato-desc">${p.descripcion || ''}</p>
                            <div class="plato-precio">${p.precio}€</div>
                        </div>
                    </div>`).join('')}
            `).join('');
        }

        function descargarPDF() {
            const element = document.getElementById('pdf-content');
            // Escondemos los botones temporalmente para que no salgan en el PDF
            document.querySelector('.controls-container').style.display = 'none';
            
            const opt = {
                margin:       10,
                filename:     'menu-restaurante.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#0f0f0f' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                // Volvemos a mostrar los botones
                document.querySelector('.controls-container').style.display = 'flex';
            });
        }
    </script>
</body>
</html>
