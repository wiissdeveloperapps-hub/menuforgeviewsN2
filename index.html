<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital Premium</title>
    
    <!-- Librerías de descompresión -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ========================================================
           VARIABLES Y CONFIGURACIÓN BASE (SISTEMA DE DISEÑO)
        ======================================================== */
        :root {
            --bg-body: #f5f5f7;
            --bg-header: rgba(255, 255, 255, 0.85);
            --bg-card: #ffffff;
            --bg-search: #f0f0f5;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: #e5e5ea;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.04);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.08);
            --modal-overlay: rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body.dark-mode {
            --bg-body: #000000;
            --bg-header: rgba(29, 29, 31, 0.85);
            --bg-card: #1c1c1e;
            --bg-search: #2c2c2e;
            --text-main: #f5f5f7;
            --text-secondary: #a1a1a6;
            --border-color: #38383a;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.2);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.3);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.5);
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ========================================================
           CABECERA (HEADER) ULTRA-PREMIUM CON GLASSMORPHISM
        ======================================================== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-header);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            transition: var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        #btn-back {
            background: var(--bg-search);
            color: var(--text-main);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
            transition: var(--transition);
            display: none; /* Oculto en la home */
        }
        #btn-back:hover { transform: scale(1.05); }

        #restaurant-logo {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .brand-info { display: flex; flex-direction: column; }

        #restaurant-name {
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        #restaurant-subtitle {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        /* BUSCADOR */
        .header-center {
            flex-grow: 1;
            max-width: 600px;
        }
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 20px;
            border: 1px solid transparent;
            background-color: var(--bg-search);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95em;
            transition: var(--transition);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* BOTONES DERECHA */
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            justify-content: flex-end;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-search);
            border-radius: 16px;
            cursor: pointer;
        }
        .lang-selector img {
            width: 20px;
            border-radius: 4px;
        }
        .lang-selector select {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            appearance: none;
        }

        .icon-btn {
            background: var(--bg-search);
            color: var(--text-main);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
            transition: var(--transition);
        }
        .icon-btn:hover { background: var(--border-color); }

        /* ========================================================
           CONTENEDOR PRINCIPAL Y VISTAS
        ======================================================== */
        main {
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 80vh;
        }

        /* HOME: GRID DE MENÚS */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .menu-card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            border: 1px solid var(--border-color);
        }
        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }
        .menu-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-search);
        }
        .menu-card-content {
            padding: 25px;
            text-align: center;
        }
        .menu-card-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .menu-card-badge {
            display: inline-block;
            background: rgba(0, 113, 227, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
        }

        /* VISTA DE LA CARTA (MENÚ SELECCIONADO) */
        .category-title {
            font-size: 2.2em;
            font-weight: 800;
            margin: 50px 0 25px 0;
            letter-spacing: -0.8px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }
        .category-title:first-child { margin-top: 0; }

        .dish-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dish-card {
            display: flex;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            gap: 20px;
            align-items: center;
        }
        .dish-card:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow-md);
        }
        
        .dish-img {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-search);
        }
        
        .dish-info { flex-grow: 1; }
        .dish-name {
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .dish-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .dish-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dish-price {
            font-size: 1.3em;
            font-weight: 800;
            color: var(--accent);
        }
        .dish-source {
            font-size: 0.75em;
            color: var(--text-secondary);
            background: var(--bg-search);
            padding: 4px 8px;
            border-radius: 8px;
        }

        /* ========================================================
           ESTADOS Y MODALES
        ======================================================== */
        .hidden { display: none !important; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state h2 { margin-bottom: 10px; color: var(--text-main); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-card);
            width: 90%;
            max-width: 450px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            transform: translateY(30px) scale(0.95);
            transition: var(--transition);
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: none;
        }
        .modal-body { padding: 30px; }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .modal-title {
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.1;
        }
        .modal-price {
            display: inline-block;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--accent);
            background: rgba(0, 113, 227, 0.1);
            padding: 6px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .modal-desc {
            font-size: 1.05em;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ========================================================
           RESPONSIVE
        ======================================================== */
        @media (max-width: 768px) {
            header { flex-wrap: wrap; padding: 12px; }
            .header-left { min-width: auto; }
            .brand-info { display: none; } /* Ocultar texto del logo en móvil para dar espacio */
            .header-center { order: 3; max-width: 100%; width: 100%; margin-top: 10px; }
            .header-right { min-width: auto; flex-grow: 1; }
            
            main { padding: 20px 15px; }
            
            .dish-card { padding: 12px; gap: 12px; }
            .dish-img { width: 80px; height: 80px; }
            .category-title { font-size: 1.8em; margin-top: 30px; }
        }
    </style>
</head>

<body>

<header id="main-header" class="hidden">
    <!-- Zona Izquierda (Botón volver, Logo, Info) -->
    <div class="header-left">
        <button id="btn-back" onclick="app.navigateHome()" title="Volver al inicio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <img id="global-logo" src="" alt="Logo" class="hidden">
        <div class="brand-info">
            <h1 id="global-name">Restaurante</h1>
            <span id="global-subtitle">Menú Digital</span>
        </div>
    </div>

    <!-- Zona Central (Buscador Global) -->
    <div class="header-center">
        <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" class="search-input" placeholder="Buscar platos en todas las cartas..." oninput="app.handleSearch(this.value)">
        </div>
    </div>

    <!-- Zona Derecha (Idioma, Tema) -->
    <div class="header-right">
        <div class="lang-selector">
            <img id="current-flag" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Flag">
            <select id="language-selector" onchange="app.changeLanguage(this.value)"></select>
        </div>
        <button id="btn-theme" class="icon-btn" onclick="app.toggleTheme()" title="Cambiar Tema">🌙</button>
    </div>
</header>

<main id="app-content">
    <div class="empty-state">
        <h2>Cargando...</h2>
        <p>Preparando la experiencia digital.</p>
    </div>
</main>

<!-- Modal de Plato -->
<div id="dish-modal" class="modal-overlay" onclick="app.closeModal(event)">
    <div class="modal-content">
        <button class="modal-close" onclick="app.closeModal(event, true)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <img id="modal-img" class="modal-img" src="" alt="">
        <div class="modal-body">
            <h3 id="modal-title" class="modal-title"></h3>
            <div id="modal-price" class="modal-price"></div>
            <p id="modal-desc" class="modal-desc"></p>
        </div>
    </div>
</div>

<script>
/**
 * ARQUITECTURA SPA PARA EL MENÚ
 */
const app = {
    data: null,
    currentLang: 'es',
    currentView: 'home', // 'home', 'menu', 'search'
    currentMenuId: null,
    searchQuery: '',

    // URLs de configuración
    REPO_OWNER: 'wiissdeveloperapps-hub',
    REPO_NAME: 'menuforgeviews',

    // Referencias DOM
    dom: {
        header: document.getElementById('main-header'),
        content: document.getElementById('app-content'),
        btnBack: document.getElementById('btn-back'),
        globalName: document.getElementById('global-name'),
        globalLogo: document.getElementById('global-logo'),
        langSelect: document.getElementById('language-selector'),
        currentFlag: document.getElementById('current-flag'),
        searchInput: document.getElementById('search-input'),
        btnTheme: document.getElementById('btn-theme'),
        
        // Modal
        modal: document.getElementById('dish-modal'),
        modalImg: document.getElementById('modal-img'),
        modalTitle: document.getElementById('modal-title'),
        modalPrice: document.getElementById('modal-price'),
        modalDesc: document.getElementById('modal-desc')
    },

    // 1. INICIALIZACIÓN
    async init() {
        try {
            const hash = window.location.hash.substring(1);
            let jsonData;

            if (hash.startsWith('pako:')) {
                jsonData = this.decompressPako(hash.substring(5));
            } else if (hash.startsWith('remote:')) {
                jsonData = await this.fetchRemote(hash.substring(7));
            } else {
                throw new Error("Formato de URL no válido.");
            }

            this.data = jsonData;
            this.setupApp();
            
        } catch (error) {
            console.error('Error:', error);
            this.dom.content.innerHTML = `<div class="empty-state"><h2>Error</h2><p>${error.message}</p></div>`;
        }
    },

    // 2. CONFIGURACIÓN BASE DE LA APP
    setupApp() {
        this.dom.header.classList.remove('hidden');

        // Configurar Info Global del Restaurante (Nuevo JSON Structure)
        const rInfo = this.data.restaurantInfo || {};
        if (rInfo.nombre) this.dom.globalName.textContent = rInfo.nombre;
        if (rInfo.logoBase64) {
            this.dom.globalLogo.src = rInfo.logoBase64;
            this.dom.globalLogo.classList.remove('hidden');
        }

        // Determinar idiomas escaneando el primer menú disponible
        // (Asumimos que todos los menús comparten los mismos idiomas base en sus traducciones)
        const firstMenu = this.data.menus && this.data.menus[0];
        if (firstMenu && firstMenu.traducciones) {
            this.dom.langSelect.innerHTML = '';
            Object.keys(firstMenu.traducciones).forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang;
                opt.textContent = firstMenu.traducciones[lang].meta?.languageName || lang.toUpperCase();
                this.dom.langSelect.appendChild(opt);
            });

            // Establecer idioma por defecto
            const browserLang = navigator.language.split('-')[0];
            this.currentLang = firstMenu.traducciones[browserLang] ? browserLang : Object.keys(firstMenu.traducciones)[0];
            this.dom.langSelect.value = this.currentLang;
            this.updateFlag();
        }

        // Iniciar en la pantalla principal
        this.navigateHome();
    },

    // 3. NAVEGACIÓN Y RENDERIZADO DE VISTAS
    navigateHome() {
        this.currentView = 'home';
        this.currentMenuId = null;
        this.dom.btnBack.style.display = 'none';
        
        if (this.searchQuery) {
            this.renderSearch();
        } else {
            this.renderHomeGrid();
        }
    },

    navigateToMenu(menuId) {
        this.currentView = 'menu';
        this.currentMenuId = menuId;
        this.dom.btnBack.style.display = 'flex';
        this.dom.searchInput.value = ''; // Limpiar búsqueda al entrar a una carta
        this.searchQuery = '';
        this.renderMenu(menuId);
    },

    // RENDER: GRID DE CARTAS
    renderHomeGrid() {
        const menus = this.data.menus || [];
        
        if (menus.length === 0) {
            this.dom.content.innerHTML = '<div class="empty-state"><h2>Sin cartas</h2><p>Este restaurante no tiene menús disponibles.</p></div>';
            return;
        }

        // Si solo hay un menú y no estamos buscando, redirigir automáticamente
        if (menus.length === 1 && !this.searchQuery) {
            this.navigateToMenu(menus[0].id);
            this.dom.btnBack.style.display = 'none'; // No mostrar volver si solo hay 1 menú
            return;
        }

        let html = '<div class="menu-grid">';
        menus.forEach(menu => {
            // Buscar la primera imagen disponible en los recursos del menú para la portada
            const imagenes = menu.recursos?.imagenes || {};
            const imgKeys = Object.keys(imagenes);
            const coverImg = imgKeys.length > 0 ? imagenes[imgKeys[0]] : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100%" height="100%" fill="%23f0f0f5"/></svg>';
            
            const trans = menu.traducciones?.[this.currentLang];
            const menuName = trans?.nombreRestaurante || menu.nombreCarta || 'Carta';

            html += `
                <div class="menu-card" onclick="app.navigateToMenu('${menu.id}')">
                    <img class="menu-card-img" src="${coverImg}" alt="${this.escapeHTML(menuName)}" loading="lazy">
                    <div class="menu-card-content">
                        <h2 class="menu-card-title">${this.escapeHTML(menuName)}</h2>
                        <span class="menu-card-badge">${menu.tipoMenu ? menu.tipoMenu.toUpperCase() : 'CARTA'}</span>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        this.dom.content.innerHTML = html;
        window.scrollTo(0,0);
    },

    // RENDER: VISTA DE UN MENÚ ESPECÍFICO
    renderMenu(menuId) {
        const menu = this.data.menus.find(m => m.id === menuId);
        if (!menu) return this.navigateHome();

        const trans = menu.traducciones?.[this.currentLang];
        if (!trans || !trans.categorias) {
            this.dom.content.innerHTML = '<div class="empty-state"><h2>Error</h2><p>Traducción no disponible para esta carta.</p></div>';
            return;
        }

        const images = menu.recursos?.imagenes || {};
        let html = '';

        trans.categorias.forEach(cat => {
            html += `<h2 class="category-title">${this.escapeHTML(cat.nombre)}</h2>`;
            html += `<div class="dish-list">`;
            
            cat.platos?.forEach(dish => {
                html += this.generateDishCardHTML(dish, images, null);
            });
            
            html += `</div>`;
        });

        this.dom.content.innerHTML = html || '<div class="empty-state"><p>Esta carta está vacía.</p></div>';
        window.scrollTo(0,0);
    },

    // 4. MOTOR DE BÚSQUEDA GLOBAL
    handleSearch(query) {
        this.searchQuery = query.trim().toLowerCase();
        
        if (!this.searchQuery) {
            // Restaurar vista anterior
            if (this.currentView === 'menu') {
                this.renderMenu(this.currentMenuId);
            } else {
                this.renderHomeGrid();
            }
            return;
        }
        this.renderSearch();
    },

    renderSearch() {
        let resultsHTML = '';
        let matchCount = 0;

        // Mostrar botón volver durante búsqueda si estábamos en la home
        this.dom.btnBack.style.display = 'flex';

        this.data.menus.forEach(menu => {
            const trans = menu.traducciones?.[this.currentLang];
            const images = menu.recursos?.imagenes || {};
            const menuName = trans?.nombreRestaurante || menu.nombreCarta || 'Carta';

            if (trans && trans.categorias) {
                trans.categorias.forEach(cat => {
                    cat.platos?.forEach(dish => {
                        const name = (dish.nombre || '').toLowerCase();
                        const desc = (dish.descripcion || '').toLowerCase();
                        
                        if (name.includes(this.searchQuery) || desc.includes(this.searchQuery)) {
                            resultsHTML += this.generateDishCardHTML(dish, images, menuName);
                            matchCount++;
                        }
                    });
                });
            }
        });

        if (matchCount === 0) {
            this.dom.content.innerHTML = `
                <div class="empty-state">
                    <h2>Sin resultados</h2>
                    <p>No encontramos "${this.escapeHTML(this.searchQuery)}" en nuestras cartas.</p>
                </div>
            `;
        } else {
            this.dom.content.innerHTML = `
                <h2 class="category-title">Resultados de búsqueda (${matchCount})</h2>
                <div class="dish-list">${resultsHTML}</div>
            `;
        }
    },

    // COMPONENTES REUTILIZABLES
    generateDishCardHTML(dish, images, sourceMenuName) {
        const imgUrl = dish.idImagen ? images[dish.idImagen] : '';
        const name = this.escapeHTML(dish.nombre);
        const desc = this.escapeHTML(dish.descripcion);
        const price = this.formatPrice(dish.precio);
        
        // Codificar data para el onclick
        const safeData = encodeURIComponent(JSON.stringify({
            name, desc, price, imgUrl, source: sourceMenuName
        }));

        return `
            <div class="dish-card" onclick="app.openModal('${safeData}')">
                ${imgUrl ? `<img class="dish-img" src="${imgUrl}" alt="${name}" loading="lazy">` : ''}
                <div class="dish-info">
                    <h3 class="dish-name">${name}</h3>
                    ${desc ? `<p class="dish-desc">${desc}</p>` : ''}
                    <div class="dish-footer">
                        <span class="dish-price">${price}</span>
                        ${sourceMenuName ? `<span class="dish-source">${this.escapeHTML(sourceMenuName)}</span>` : ''}
                    </div>
                </div>
            </div>
        `;
    },

    // 5. GESTIÓN DEL MODAL
    openModal(safeDataStr) {
        const data = JSON.parse(decodeURIComponent(safeDataStr));
        
        this.dom.modalTitle.textContent = data.name;
        this.dom.modalPrice.textContent = data.price;
        this.dom.modalDesc.innerHTML = data.desc || '<i>Sin descripción adicional.</i>';
        
        if (data.imgUrl) {
            this.dom.modalImg.src = data.imgUrl;
            this.dom.modalImg.style.display = 'block';
        } else {
            this.dom.modalImg.style.display = 'none';
        }

        this.dom.modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // Evitar scroll de fondo
    },

    closeModal(event, force = false) {
        // Cierra si se fuerza (botón X) o si se clickea el overlay (fuera del contenido)
        if (force || event.target === this.dom.modal) {
            this.dom.modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    },

    // 6. UTILIDADES Y EVENTOS
    changeLanguage(langCode) {
        this.currentLang = langCode;
        this.updateFlag();
        // Refrescar vista actual
        if (this.searchQuery) {
            this.renderSearch();
        } else if (this.currentView === 'menu') {
            this.renderMenu(this.currentMenuId);
        } else {
            this.renderHomeGrid();
        }
    },

    updateFlag() {
        this.dom.currentFlag.src = `assets/flags/${this.currentLang}.png`;
    },

    toggleTheme() {
        document.body.classList.toggle('dark-mode');
        this.dom.btnTheme.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    },

    formatPrice(price) {
        if (typeof price !== 'number') return '';
        return price.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
    },

    escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, function(match) {
            return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[match];
        });
    },

    // DECOMPRESIÓN (Mantenido de tu lógica original)
    decompressPako(base64String) {
        try {
            const compressed = atob(base64String).split('').map(c => c.charCodeAt(0));
            const decompressed = pako.inflate(new Uint8Array(compressed), { to: 'string' });
            return JSON.parse(decompressed);
        } catch (error) {
            throw new Error('Los datos están corruptos.');
        }
    },

    async fetchRemote(id) {
        const url = `https://raw.githubusercontent.com/${this.REPO_OWNER}/${this.REPO_NAME}/main/contents/menus/${id}.json`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`No se pudo cargar remoto ID: ${id}`);
        const rawText = await response.text();
        let jsonString = LZString.decompressFromEncodedURIComponent(rawText) || rawText;
        return JSON.parse(jsonString);
    }
};

// Arrancar la aplicación al cargar
document.addEventListener('DOMContentLoaded', () => app.init());

</script>
